<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDI Gurgaon — Pilot Investment Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B2A4A;--navy2:#243656;--amber:#D4891A;--amber-lt:#FDF3DC;
  --white:#FFFFFF;--off:#F7F8FA;--slate:#64748B;--light:#E2E8F0;
  --dark:#1E293B;--red:#C0392B;--green:#1A7A44;--mid:#94A3B8;
  --radius:10px;--shadow:0 4px 24px rgba(27,42,74,0.10);
  --font-h:'Libre Baskerville',Georgia,serif;--font-b:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--off);color:var(--dark);min-height:100vh;font-size:15px;line-height:1.6}
.progress-wrap{position:sticky;top:0;z-index:100;background:var(--navy);padding:10px 20px;display:flex;align-items:center;gap:14px}
.progress-bar{flex:1;height:4px;background:rgba(255,255,255,0.2);border-radius:2px}
.progress-fill{height:100%;background:var(--amber);border-radius:2px;transition:width 0.5s ease}
.progress-label{font-size:12px;color:rgba(255,255,255,0.7);white-space:nowrap}
.shell{max-width:720px;margin:0 auto;padding:0 16px 60px}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 32px;margin-top:24px;border:1px solid var(--light)}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--amber)}
.block-badge{background:var(--navy);color:var(--white);font-size:10px;font-weight:600;letter-spacing:0.08em;padding:4px 10px;border-radius:20px;white-space:nowrap;text-transform:uppercase}
.card-title{font-family:var(--font-h);font-size:17px;color:var(--navy)}
.honesty{background:var(--off);border-left:3px solid var(--mid);border-radius:0 6px 6px 0;padding:8px 14px;margin-bottom:18px;font-size:12.5px;color:var(--slate);font-style:normal}
.sec-label{font-size:11px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--amber);margin:20px 0 8px}
.q-block{margin-bottom:20px}
.q-label{font-size:14px;font-weight:500;color:var(--dark);margin-bottom:8px;line-height:1.55}
.q-num{display:inline-block;background:var(--amber);color:var(--white);font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;margin-right:8px;vertical-align:middle}
.q-note{font-size:12px;color:var(--slate);font-style:italic;margin-top:4px}
input[type=text],input[type=number],input[type=email],select,textarea{width:100%;padding:10px 14px;border:1.5px solid var(--light);border-radius:8px;font-family:var(--font-b);font-size:14px;color:var(--dark);background:var(--white);transition:border-color 0.2s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(212,137,26,0.15)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.options{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-radius:8px;border:1.5px solid var(--light);cursor:pointer;transition:all 0.15s;font-size:14px;background:var(--white)}
.opt:hover{border-color:var(--amber);background:var(--amber-lt)}
.opt.selected{border-color:var(--amber);background:var(--amber-lt)}
.opt input{margin-top:2px;flex-shrink:0;accent-color:var(--amber)}
.matrix-wrap{overflow-x:auto;margin-top:8px}
.matrix{width:100%;border-collapse:collapse;font-size:13px}
.matrix th{background:var(--navy);color:var(--white);padding:8px 6px;text-align:center;font-weight:600;font-size:11.5px;border:1px solid var(--navy2)}
.matrix th.stmt-col{text-align:left;width:50%}
.matrix td{padding:9px 6px;border:1px solid var(--light);text-align:center;vertical-align:middle}
.matrix td.stmt{text-align:left;padding-left:10px;font-size:13px;line-height:1.4}
.matrix tr:nth-child(even) td{background:var(--off)}
.matrix input[type=radio]{accent-color:var(--amber);width:16px;height:16px;cursor:pointer}
.task-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
.task-table th{background:var(--navy);color:var(--white);padding:9px 10px;font-size:12px;font-weight:600;border:1px solid var(--navy2)}
.task-table td{padding:9px 10px;border:1px solid var(--light);vertical-align:middle;text-align:center}
.task-table tr:nth-child(even) td{background:var(--off)}
.task-table td.row-lbl{font-weight:600;color:var(--navy);width:50px}
.task-table td input[type=radio]{accent-color:var(--amber);width:16px;height:16px;cursor:pointer}
.task-table td input[type=radio]:disabled{opacity:0.35;cursor:not-allowed}
.alloc-total{margin-top:10px;padding:11px 16px;border-radius:8px;background:var(--off);border:1.5px solid var(--light);display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:500}
.alloc-total-val{font-size:16px;font-weight:700}
.alloc-ok{color:var(--green)}.alloc-err{color:var(--red)}
.info-box{background:var(--off);border-left:4px solid var(--navy);border-radius:0 8px 8px 0;padding:12px 16px;margin:10px 0;font-size:13.5px;color:var(--dark);line-height:1.6}
.warn-box{background:var(--amber-lt);border-left:4px solid var(--amber);border-radius:0 8px 8px 0;padding:12px 16px;margin:10px 0;font-size:13.5px;color:var(--dark);line-height:1.6}
.error-box{background:#fdf0ef;border-left:4px solid var(--red);border-radius:0 8px 8px 0;padding:11px 16px;margin:10px 0;font-size:13.5px;color:var(--red);font-weight:500;display:none}
.inst-table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
.inst-table th{background:var(--navy);color:var(--white);padding:8px 10px;font-size:12px;border:1px solid var(--navy2)}
.inst-table td{padding:8px 10px;border:1px solid var(--light);vertical-align:middle}
.inst-table tr:nth-child(even) td{background:var(--off)}
.timer-bar-wrap{background:var(--light);border-radius:6px;height:8px;margin-bottom:14px;overflow:hidden}
.timer-bar-fill{height:100%;background:var(--green);border-radius:6px;transition:width 1s linear}
.timer-label{font-size:12px;color:var(--slate);margin-bottom:6px;text-align:right}
.return-card{border:1.5px solid var(--light);border-radius:10px;overflow:hidden;margin-bottom:12px}
.return-card-header{background:var(--navy);color:var(--white);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600}
.return-pay-badge{background:var(--amber);color:var(--navy);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.return-body{padding:12px 16px}
.return-assets{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px}
.return-asset{background:var(--off);border-radius:6px;padding:7px 5px;text-align:center;border:1px solid var(--light)}
.return-asset-name{font-size:11px;font-weight:600;color:var(--navy)}
.return-asset-alloc{font-size:11.5px;color:var(--slate)}
.return-asset-ret{font-size:12.5px;font-weight:700}
.ret-pos{color:var(--green)}.ret-neg{color:var(--red)}.ret-zero{color:var(--slate)}
.return-summary{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;border-radius:8px;background:var(--off);border:1.5px solid var(--light);font-size:14px;margin-top:6px}
.return-total{font-size:18px;font-weight:700;font-family:var(--font-h)}
.cover{min-height:100vh;background:linear-gradient(rgba(27,42,74,0.82),rgba(27,42,74,0.92));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.cover-logo{font-family:var(--font-h);font-size:12px;color:var(--amber);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:36px}
.cover-title{font-family:var(--font-h);font-size:clamp(20px,3.5vw,30px);color:var(--white);line-height:1.3;margin-bottom:10px;max-width:520px}
.cover-sub{font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:32px;max-width:440px;line-height:1.6}
.cover-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:420px;width:100%;margin-bottom:32px}
.meta-item{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:11px 15px;text-align:left}
.meta-label{font-size:10px;color:var(--amber);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px}
.meta-value{font-size:13px;color:var(--white)}
.btn{padding:11px 26px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all 0.2s;font-family:var(--font-b)}
.btn-primary{border-color:var(--amber);background:var(--amber);color:var(--white)}
.btn-primary:hover{background:#b8750f;border-color:#b8750f}
.loading{position:fixed;inset:0;background:rgba(27,42,74,0.7);display:none;align-items:center;justify-content:center;z-index:9999}
.loading-inner{background:var(--white);border-radius:12px;padding:28px 36px;text-align:center}
.spinner{width:36px;height:36px;border:3px solid var(--light);border-top-color:var(--amber);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.card{padding:18px 16px}.cover-meta{grid-template-columns:1fr}.return-assets{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="loading" id="loading"><div class="loading-inner"><div class="spinner"></div><div style="font-size:14px;color:var(--slate)">Checking…</div></div></div>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIG  —  paste your NEW pilot Google Apps Script Web App URL here
// ═══════════════════════════════════════════════════════════════════════════
const CONFIG = {
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbx-LgyWBT8tgqdOdAQG_T6moadmQ0K5VR7GurbonNCiBFBdVpN9dE3X16-XYtKDjyoA/exec",   // ← paste pilot Web App URL here
};

// ═══════════════════════════════════════════════════════════════════════════
// ASSET PARAMETERS — three round-specific configurations
// Returns are drawn from a UNIFORM distribution over [min, max].
// Each object key maps to: { label, desc, ret (display), min, max }
// ═══════════════════════════════════════════════════════════════════════════
const ASSETS_R1 = {
  cash:{ label:"Cash",    desc:"Guaranteed (no risk)",                min:0,   max:0,   ret:"0%",    range:"Always 0%" },
  L:   { label:"Asset L", desc:"Short-term bonds / liquid funds",     min:5,   max:16,  ret:"+10.5%",range:"+5% to +16%" },
  M:   { label:"Asset M", desc:"Large-cap equity index",              min:13,  max:30,  ret:"+21.5%",range:"+13% to +30%" },
  H:   { label:"Asset H", desc:"Small-cap / mid-cap equity",          min:26,  max:46,  ret:"+36%",  range:"+26% to +46%" },
  V:   { label:"Asset V", desc:"Sector funds / momentum plays",       min:40,  max:62,  ret:"+51%",  range:"+40% to +62%" },
};
const ASSETS_R2 = {
  cash:{ label:"Cash",    desc:"Guaranteed (no risk)",                min:0,   max:0,   ret:"0%",    range:"Always 0%" },
  L:   { label:"Asset L", desc:"Short-term bonds / liquid funds",     min:6,   max:14,  ret:"+10%",  range:"+6% to +14%" },
  M:   { label:"Asset M", desc:"Large-cap equity index",              min:12,  max:26,  ret:"+19%",  range:"+12% to +26%" },
  H:   { label:"Asset H", desc:"Small-cap / mid-cap equity",          min:24,  max:42,  ret:"+33%",  range:"+24% to +42%" },
  V:   { label:"Asset V", desc:"Sector funds / momentum plays",       min:38,  max:58,  ret:"+48%",  range:"+38% to +58%" },
};
const ASSETS_R3 = {
  cash:{ label:"Cash",    desc:"Guaranteed (no risk)",                min:0,   max:0,   ret:"0%",    range:"Always 0%" },
  L:   { label:"Asset L", desc:"Short-term bonds / liquid funds",     min:4,   max:18,  ret:"+11%",  range:"+4% to +18%" },
  M:   { label:"Asset M", desc:"Large-cap equity index",              min:14,  max:33,  ret:"+23.5%",range:"+14% to +33%" },
  H:   { label:"Asset H", desc:"Small-cap / mid-cap equity",          min:28,  max:50,  ret:"+39%",  range:"+28% to +50%" },
  V:   { label:"Asset V", desc:"Sector funds / momentum plays",       min:42,  max:65,  ret:"+53.5%",range:"+42% to +65%" },
};
// Convenience map and display-only reference (Block 3 instructions use R1)
const ASSETS_BY_ROUND = { 1:ASSETS_R1, 2:ASSETS_R2, 3:ASSETS_R3 };
const ASSETS = ASSETS_R1; // kept for Return Explorer (instructions screen)
const ENDOWMENT = 50000;

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
const state = {
  section:       "cover",
  pid:           null,
  email:         null,
  resumeSection: null,
  payRound:      null,
  lotteryOrder:  null,
  condition:     "Control",
  conditionNum:  0,
  compAttempts:  0,
  compQuestion:  1,
  allocs:        {R1:{cash:0,L:0,M:0,H:0,V:0},R2:{cash:0,L:0,M:0,H:0,V:0},R3:{cash:0,L:0,M:0,H:0,V:0}},
  answers:       {},
  hlSwitched:    false,
  laSwitched:    false,
  fl2RandomOrder:null,
  hlResult:      null,
  laResult:      null,
  hlPayRow:      null,
  laPayRow:      null,
};

// ═══════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function uid(){ return "PP_"+Date.now()+"_"+Math.random().toString(36).slice(2,7).toUpperCase(); }

// Draw uniformly from [min, max] — simple and pre-registration friendly
function randUniform(min,max){
  if(min===max) return min;
  return min + Math.random()*(max-min);
}

// calcReturn now accepts the round-specific asset config (defaults to ASSETS_R1)
function calcReturn(alloc, assetCfg){
  assetCfg = assetCfg || ASSETS_R1;
  const total=Object.values(alloc).reduce((a,b)=>a+b,0)||ENDOWMENT;
  let portfolio=0;const breakdown={};
  for(const[k,a] of Object.entries(assetCfg)){
    const w=(alloc[k]||0)/total;
    const draw=randUniform(a.min,a.max);
    breakdown[k]={w,draw,amt:alloc[k]||0};
    portfolio+=w*draw;
  }
  return{portfolio:parseFloat(portfolio.toFixed(1)),breakdown};
}

function fmt(n){return(n>=0?"+":"")+n.toFixed(1)+"%"}
function fmtINR(n){return "₹"+Math.round(n).toLocaleString("en-IN")}
function fmtEU(n){return n.toLocaleString("en-IN")+" EU"}
function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getChecked(name){const el=document.querySelector(`input[name="${name}"]:checked`);return el?el.value:null;}
function selectOpt(el,name){
  document.querySelectorAll(`input[name="${name}"]`).forEach(i=>i.closest(".opt")?.classList.remove("selected"));
  el.classList.add("selected");
  const inp=el.querySelector("input");inp.checked=true;
  inp.dispatchEvent(new Event("change",{bubbles:true}));
}
function allocTotal(alloc){return Object.values(alloc).reduce((a,b)=>a+b,0);}
function progress(pct){
  const f=document.querySelector(".progress-fill");const l=document.querySelector(".progress-label");
  if(f)f.style.width=pct+"%";if(l)l.textContent=Math.round(pct)+"% complete";
}
function navRow(nextFn,nextLabel="Continue →"){
  return `<div style="margin-top:24px;padding-top:16px;border-top:1.5px solid var(--light);display:flex;justify-content:flex-end">
    <button class="btn btn-primary" onclick="${nextFn}">${nextLabel}</button></div>`;
}
function showLoading(show){const el=document.getElementById("loading");if(el)el.style.display=show?"flex":"none";}

// ── Explorer helpers ───────────────────────────────────────────────────────
function updateExpTotal(){
  const keys=["cash","L","M","H","V"];let total=0;
  keys.forEach(k=>{const el=document.getElementById("exp_"+k);total+=el?(parseFloat(el.value)||0):0;});
  const el=document.getElementById("exp-total");if(!el)return;
  const ok=total===50000;
  el.innerHTML=`Total: <span class="alloc-total-val ${ok?"alloc-ok":"alloc-err"}">${total.toLocaleString("en-IN")} / 50,000</span> ${ok?"✓":""}`;
}
function runExplorer(){
  const keys=["cash","L","M","H","V"];const alloc={};let total=0;
  keys.forEach(k=>{const v=parseFloat(document.getElementById("exp_"+k)?.value)||0;alloc[k]=v;total+=v;});
  if(total!==50000){document.getElementById("exp-error").style.display="block";return;}
  document.getElementById("exp-error").style.display="none";
  const{portfolio,breakdown}=calcReturn(alloc, ASSETS_R1);
  const portR=parseFloat(portfolio.toFixed(1));
  const retClass=portR>0?"ret-pos":portR<0?"ret-neg":"ret-zero";
  const endEU=Math.round(50000*(1+portR/100));
  const rows=Object.entries(ASSETS_R1).map(([k,a])=>{
    const amt=alloc[k]||0;if(!amt)return"";
    const draw=parseFloat((breakdown[k]?.draw??0).toFixed(1));
    const eu=Math.round(amt*(1+draw/100));
    const cls=draw>0?"ret-pos":draw<0?"ret-neg":"ret-zero";
    return `<tr><td><strong>${a.label}</strong></td><td style="text-align:right">${amt.toLocaleString("en-IN")}</td><td style="text-align:center">${a.range}</td><td style="text-align:center" class="${cls}">${fmt(draw)}</td><td style="text-align:right">${eu.toLocaleString("en-IN")}</td></tr>`;
  }).filter(Boolean).join("");
  document.getElementById("exp-result").innerHTML=`
    <div style="background:var(--off);border-radius:10px;padding:14px 16px;border:1.5px solid var(--light)">
      <div class="sec-label" style="margin:0 0 10px">Simulated Result</div>
      <table class="inst-table" style="margin:0 0 12px">
        <thead><tr><th>Asset</th><th>Allocated</th><th>Return Range</th><th>Your Return</th><th>Final Amount</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="font-size:15px;font-weight:600">Portfolio Return: <span class="${retClass}">${fmt(portR)}</span> &nbsp;|&nbsp; Ending: <strong>${endEU.toLocaleString("en-IN")} units</strong></div>
      <div style="font-size:12px;color:var(--slate);margin-top:6px">Returns vary each run due to random draws.</div>
    </div>`;
  document.getElementById("exp-result").style.display="block";
  document.getElementById("exp-reset-btn").style.display="inline-block";
}
function resetExplorer(){
  ["cash","L","M","H","V"].forEach(k=>{const el=document.getElementById("exp_"+k);if(el)el.value="";});
  document.getElementById("exp-result").style.display="none";
  document.getElementById("exp-reset-btn").style.display="none";
  updateExpTotal();
}
function updateAllocTotal(round){
  const keys=["cash","L","M","H","V"];let total=0;
  keys.forEach(k=>{const el=document.getElementById(`${round}_${k}`);total+=el?(parseFloat(el.value)||0):0;});
  const el=document.getElementById(`total_${round}`);if(!el)return;
  const ok=total===ENDOWMENT;
  el.innerHTML=`Total: <span class="alloc-total-val ${ok?"alloc-ok":"alloc-err"}">${fmtEU(total)}</span> ${ok?"✓":"— must equal "+fmtEU(ENDOWMENT)}`;
}

// ═══════════════════════════════════════════════════════════════════════════
// DATA SAVING
// ─────────────────────────────────────────────────────────────────────────
// Uses fetch POST with mode:"no-cors" ONLY — no image beacon.
// "no-cors" returns an opaque response so mis-configured deployments
// never produce 401 console errors.
// Failed sends are queued and retried automatically every 3 s.
// ═══════════════════════════════════════════════════════════════════════════
const _saveQueue=[];
let   _saving=false;

function saveData(payload){
  if(!CONFIG.SCRIPT_URL){
    console.log("[survey] No SCRIPT_URL — skipping block:",payload.block);
    return;
  }
  _saveQueue.push(payload);
  _flushQueue();
}

function _flushQueue(){
  if(_saving||_saveQueue.length===0)return;
  _saving=true;
  const payload=_saveQueue[0];
  const body="data="+encodeURIComponent(JSON.stringify(payload));
  fetch(CONFIG.SCRIPT_URL,{
    method:"POST",
    mode:"no-cors",
    cache:"no-cache",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body
  })
  .then(()=>{
    console.log("[survey] Saved:",payload.block,"| pid:",payload.pid);
    _saveQueue.shift();
    _saving=false;
    if(_saveQueue.length>0)_flushQueue();
  })
  .catch(err=>{
    console.warn("[survey] Save failed, retrying in 3s:",err.message);
    _saving=false;
    setTimeout(_flushQueue,3000);
  });
}
function saveBlock(block,data){
  saveData({pid:state.pid,email:state.email||"",timestamp:new Date().toISOString(),
    condition:state.condition||"Control",
    conditionNum:state.conditionNum||0,
    payRound:state.payRound||"",
    lastSection:state.section||"",
    block,...data});
}

// ── JSONP email check ─────────────────────────────────────────────────────
function checkEmailAndStart(email){
  if(!CONFIG.SCRIPT_URL){state.email=email;startSurvey();return;}

  // ── Client-side session lock ───────────────────────────────────────────
  // If this browser tab already started a session with THIS email,
  // treat it as partial without hitting the server at all.
  const sessionKey = "mdi_pilot_email";
  const sessionPid  = "mdi_pilot_pid";
  const lockedEmail = sessionStorage.getItem(sessionKey);
  if(lockedEmail && lockedEmail.toLowerCase()===email.toLowerCase()){
    state.email = email;
    state.pid   = sessionStorage.getItem(sessionPid) || uid();
    // Already started — just resume from block1 (safest fallback)
    document.getElementById("app").innerHTML=`
      <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div><div class="progress-label">0% complete</div></div>
      <div class="shell" id="sections-wrap"></div>`;
    document.getElementById("sections-wrap").innerHTML=`
      <div class="card" style="text-align:center;padding:40px 32px">
        <h2 style="font-family:var(--font-h);color:var(--navy);margin-bottom:12px">Session Already Active</h2>
        <p style="color:var(--slate);font-size:14px;line-height:1.8;margin-bottom:24px">
          A session is already in progress for <strong>${email}</strong> in this browser.<br>
          Please continue your current session.
        </p>
        <button class="btn btn-primary" onclick="resumeSurvey()">Continue →</button>
      </div>`;
    state.resumeSection = "block1";
    return;
  }

  showLoading(true);
  const cbName="_emailCb_"+Date.now();let done=false;
  window[cbName]=function(res){
    done=true;showLoading(false);delete window[cbName];
    const s=document.getElementById("jsonp-email-check");if(s)s.remove();
    if(res.status==="complete"){
      document.getElementById("app").innerHTML=`
        <div class="cover" style="justify-content:center">
          <div style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:36px 32px;max-width:440px;text-align:center">

              Our records show that <strong style="color:var(--amber)">${email}</strong> has already completed this survey.<br><br>

            </p>
            <p style="margin-top:20px;color:rgba(255,255,255,0.4);font-size:12px">Contact: puneet.arora@mdi.ac.in</p>
          </div></div>`;
    } else if(res.status==="partial"){
      state.email=email;state.pid=res.pid||uid();state.resumeSection=res.lastSection||"block1";
      document.getElementById("app").innerHTML=`
        <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div><div class="progress-label">0% complete</div></div>
        <div class="shell" id="sections-wrap"></div>`;
      document.getElementById("sections-wrap").innerHTML=`
        <div class="card" style="text-align:center;padding:40px 32px">
          <h2 style="font-family:var(--font-h);color:var(--navy);margin-bottom:12px">Welcome Back</h2>
          <p style="color:var(--slate);font-size:14px;line-height:1.8;margin-bottom:24px">We found an incomplete response for <strong>${email}</strong>.<br>You can continue from where you left off, or start fresh.</p>
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
            <button class="btn btn-primary" onclick="resumeSurvey()">Resume where I left off →</button>
            <button class="btn" style="border-color:var(--light);color:var(--slate)" onclick="startFresh()">Start fresh</button>
          </div></div>`;
    } else {
      state.email=email;startSurvey();
    }
  };
  const timer=setTimeout(()=>{
    if(!done){done=true;showLoading(false);delete window[cbName];
      const s=document.getElementById("jsonp-email-check");if(s)s.remove();
      state.email=email;startSurvey();}
  },6000);
  const script=document.createElement("script");
  script.id="jsonp-email-check";
  script.src=CONFIG.SCRIPT_URL+"?action=checkEmail&email="+encodeURIComponent(email)+"&callback="+cbName;
  script.onerror=()=>{clearTimeout(timer);if(!done){done=true;showLoading(false);delete window[cbName];state.email=email;startSurvey();}};
  document.head.appendChild(script);
}
function resumeSurvey(){goSection(state.resumeSection||"block1");}

function goSection(sec){
  state.section=sec;
  // Send a lightweight progress ping so lastSection is always current in Sheets
  if(state.pid && CONFIG.SCRIPT_URL){
    saveData({pid:state.pid,email:state.email||"",timestamp:new Date().toISOString(),
      condition:state.condition||"Control",conditionNum:state.conditionNum||0,
      payRound:state.payRound||"",lastSection:sec,block:"PROGRESS"});
  }
  const wrap=document.getElementById("sections-wrap");
  const fns={
    cover:renderCover, participantInfo:renderParticipantInfo, consent:renderConsent,
    block1:renderBlock1, block2:renderBlock2, block3:renderBlock3,
    prelottery:renderPreLottery,
    preInvestment:renderPreInvestment,
    lottery_a:renderLotteryA, lottery_b:renderLotteryB,
    block6:()=>renderRound(1), block7:()=>renderRound(2), block8:()=>renderRound(3),
    block8s:renderSelfAssess,
    block9:renderBlock9, block9b:renderBlock9b,
    block11:renderBlock11,
  };
  if(fns[sec])wrap.innerHTML=fns[sec]();
  attachHandlers(sec);
  window.scrollTo({top:0,behavior:"smooth"});
}

function startStudy(){
  const emailEl=document.getElementById("cover_email");
  const errEl=document.getElementById("err-cover-email");
  const email=emailEl?emailEl.value.trim():"";
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    if(errEl)errEl.style.display="block";if(emailEl)emailEl.focus();return;
  }
  if(errEl)errEl.style.display="none";
  checkEmailAndStart(email);
}

function startSurvey(){
  state.pid=uid();
  state.lotteryOrder=Math.random()<0.5?"HL_first":"LA_first";
  // Lock this email in sessionStorage so re-entry in same tab is blocked
  try{
    sessionStorage.setItem("mdi_pilot_email", state.email||"");
    sessionStorage.setItem("mdi_pilot_pid",   state.pid);
  }catch(e){}
  console.log("Pilot | PID:",state.pid,"| Lotteries:",state.lotteryOrder,"| Email:",state.email);
  document.getElementById("app").innerHTML=`
    <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div><div class="progress-label">0% complete</div></div>
    <div class="shell" id="sections-wrap"></div>`;
  goSection("participantInfo");
}

   q:(n)=>`${n[0]} invested ₹1,00,000 in a fixed deposit at 8% per year compounded annually. After 3 years, which is closest to his total amount?`,

   q:(n)=>`${n[0]} holds a bond with a face value of ₹1,000, a coupon rate of 7%, and 5 years to maturity. If market interest rates rise to 9%, what happens to the bond's market price?`,

  }).join("");

function hlChange(row,choice){
  if(!state.hlManual) state.hlManual={};
  state.hlManual[row]=choice;

  let firstB=-1;
  for(let i=0;i<10;i++){if(state.hlManual[i]==="B"){firstB=i;break;}}
  // Propagate: rows after firstB are locked to B; rows before are free
  for(let i=0;i<10;i++){
    const aEl=document.getElementById(`hl_${i}_A`);
    const bEl=document.getElementById(`hl_${i}_B`);
    if(!aEl) continue;
    if(firstB>=0 && i>firstB){
      if(bEl){bEl.checked=true;bEl.disabled=false;bEl.closest("label").style.opacity="1";}
      aEl.checked=false;aEl.disabled=true;aEl.closest("label").style.opacity="0.4";
    } else {
      aEl.disabled=false;aEl.closest("label").style.opacity="1";
      if(bEl){bEl.disabled=false;bEl.closest("label").style.opacity="1";}
      const m=state.hlManual[i];
      aEl.checked=m==="A";if(bEl)bEl.checked=m==="B";
    }
  }
  state.hlSwitched=firstB>=0;
  checkHLComplete();

  if(laChoice==="accept"){laHeads=Math.random()<0.5;laPayout=laHeads?200:-LA_LOSSES[laRow];}
  state.laResult={row:laRow+1,choice:laChoice,heads:laHeads,payout:laPayout};
  const d={la_responses:vals.join(","),la_switch:sw,la_pay_row:laRow+1,la_choice:laChoice,la_payout:laPayout};
  state.answers.la=d;
  saveBlock("B5b_LossAversion",d);
  if(state.lotteryOrder==="LA_first") goSection("lottery_b");
  else goSection("preInvestment");
}

function renderLotteryA(){return state.lotteryOrder==="HL_first"?renderHL():renderLA();}
function renderLotteryB(){return state.lotteryOrder==="HL_first"?renderLA():renderHL();}

function renderRound(num){
  const progs={1:62,2:70,3:78};
  const nexts={1:"block7",2:"block8",3:"block8s"};
  const nextLabel=num<3?"Go to next round →":"Continue →";
  const cfg=ASSETS_BY_ROUND[num];
  const assetRows=Object.entries(cfg).map(([k,a])=>`
    <tr>
      <td><strong>${a.label}</strong></td><td>${a.desc}</td>
      <td style="text-align:center">${a.ret}</td>
      <td style="text-align:center">${a.range}</td>
      <td style="text-align:center;padding:6px 8px">
        <input type="number" id="R${num}_${k}" min="0" max="${ENDOWMENT}" step="500" placeholder="0"
          style="width:90px;padding:6px 8px;font-size:13px;border:1.5px solid var(--light);border-radius:6px;text-align:right"
          oninput="this.value=Math.max(0,parseInt(this.value)||0);updateAllocTotal('R${num}')">
      </td>
    </tr>`).join("");
  progress(progs[num]);
  return `<div class="card">
    <div class="card-header"><span class="block-badge">Round ${num} of 3</span><h2 class="card-title">Investment Decision — Round ${num}</h2></div>
    <div class="info-box">Allocate your <strong>50,000 EU</strong> across the five assets using the column on the right. Your allocations must sum to exactly 50,000 EU. Note that asset return ranges may differ slightly across rounds.</div>
    <div class="sec-label">Asset Menu &amp; Allocation — Round ${num}</div>
    <div style="overflow-x:auto"><table class="inst-table">
      <thead><tr><th>Asset</th><th>Description</th><th>Expected Return</th><th>Return Range (Min – Max)</th><th>Amount to Allocate (EU)</th></tr></thead>
      <tbody>${assetRows}</tbody>
    </table></div>
    <div class="alloc-total" style="margin-top:10px" id="total_R${num}">Total: <span class="alloc-total-val alloc-err">0 / 50,000 EU</span></div>
    <div id="err-round${num}" class="error-box">Allocations must sum to exactly 50,000.</div>
    ${navRow(`submitRound(${num},'${nexts[num]}')`,nextLabel)}
  </div>`;
}
function submitRound(num,next){
  const keys=["cash","L","M","H","V"];const alloc={};let total=0;
  keys.forEach(k=>{const v=parseFloat(document.getElementById(`R${num}_${k}`)?.value)||0;alloc[k]=v;total+=v;});
  if(total!==ENDOWMENT){document.getElementById(`err-round${num}`).style.display="block";return;}
  state.allocs[`R${num}`]=alloc;
  const hi_risk_share=((alloc.H+alloc.V)/ENDOWMENT*100).toFixed(1);
  const cash_share=(alloc.cash/ENDOWMENT*100).toFixed(1);
  saveBlock(`B_Round${num}`,{...alloc,hi_risk_share,cash_share});
  goSection(next);
}

// RENDER — BLOCK 11: RESULTS & PAYOUT
// ═══════════════════════════════════════════════════════════════════════════
function renderBlock11(){
  progress(100);
  // Calculate returns for all three rounds
  const rounds=[1,2,3].map(n=>{
    const alloc=state.allocs[`R${n}`];
    const{portfolio,breakdown}=calcReturn(alloc, ASSETS_BY_ROUND[n]);
    return{n,alloc,portfolio,breakdown};
  });
  // Randomly select one round for payment
  const payIdx=Math.floor(Math.random()*3);
  const payRound=rounds[payIdx];
  state.payRound=payRound.n;
  const payEU=Math.round(ENDOWMENT*(1+payRound.portfolio/100));
  const payINR=payEU/100;
  const hlPayout=state.hlResult?.payout||0;
  const laPayout=state.laResult?.payout||0;
  const belief=state.answers.belief_yn;
  const bonusCorrect=belief?((belief==="yes")===(payEU>=70000)):false;
  const bonusINR=bonusCorrect?50:0;
  const totalINR=Math.min(1500,Math.round((Math.max(100,100+payINR+hlPayout+laPayout+bonusINR))/50)*50);

  // Save results
  saveBlock("B11_Returns",{
    r1:rounds[0].portfolio,r2:rounds[1].portfolio,r3:rounds[2].portfolio,
    pay_round:payRound.n,pay_eu:payEU,pay_inr:payINR,
    hl_payout:hlPayout,la_payout:laPayout,
    belief_yn:belief,belief_correct:bonusCorrect,bonus_inr:bonusINR,
    total_inr:totalINR,
  });

  // Build round cards
  const roundCards=rounds.map(r=>{
    const isPay=r.n===payRound.n;
    const endEU=Math.round(ENDOWMENT*(1+r.portfolio/100));
    const cls=r.portfolio>0?"ret-pos":r.portfolio<0?"ret-neg":"ret-zero";
    const roundCfg=ASSETS_BY_ROUND[r.n];
    const assetBoxes=Object.entries(roundCfg).map(([k,a])=>{
      const bd=r.breakdown[k];if(!bd||!bd.amt)return"";
      const dc=bd.draw>0?"ret-pos":bd.draw<0?"ret-neg":"ret-zero";
      return `<div class="return-asset"><div class="return-asset-name">${a.label}</div><div class="return-asset-alloc">${bd.amt.toLocaleString("en-IN")} EU</div><div class="return-asset-ret ${dc}">${fmt(bd.draw)}</div></div>`;
    }).filter(Boolean).join("");
    return `<div class="return-card" style="${isPay?"border-color:var(--amber);box-shadow:0 0 0 2px rgba(212,137,26,0.25)":""}">
      <div class="return-card-header">Round ${r.n} ${isPay?`<span class="return-pay-badge">★ SELECTED FOR PAYMENT</span>`:""}
        <span class="${cls}">${fmt(r.portfolio)}</span></div>
      <div class="return-body">
        <div class="return-assets">${assetBoxes}</div>
        <div class="return-summary">
          <span>Ending value</span>
          <span class="return-total ${cls}">${endEU.toLocaleString("en-IN")} EU = ${fmtINR(endEU/100)}</span>
        </div>
      </div>
    </div>`;
  }).join("");

  return `<div class="card">
    <div class="card-header"><span class="block-badge">Results</span><h2 class="card-title">Your Earnings</h2></div>
    <div class="sec-label">Investment Round Results</div>
    ${roundCards}
    <div class="sec-label">Payout Summary</div>
    <table style="width:100%;border-collapse:collapse;font-size:14px;margin-top:8px">
      <tbody>
        <tr style="border-bottom:1px solid var(--light)"><td style="padding:10px 8px;color:var(--slate)">Participation fee</td><td style="padding:10px 8px;text-align:right;font-weight:600">₹100</td></tr>
        <tr style="border-bottom:1px solid var(--light)"><td style="padding:10px 8px;color:var(--slate)">Investment round ${payRound.n} payout</td><td style="padding:10px 8px;text-align:right;font-weight:600">${fmtINR(payINR)}</td></tr>
        <tr style="border-bottom:1px solid var(--light)"><td style="padding:10px 8px;color:var(--slate)">Choice Task 1 payout</td><td style="padding:10px 8px;text-align:right;font-weight:600">${fmtINR(hlPayout)}</td></tr>
        <tr style="border-bottom:1px solid var(--light)"><td style="padding:10px 8px;color:var(--slate)">Choice Task 2 payout</td><td style="padding:10px 8px;text-align:right;font-weight:600">${fmtINR(laPayout)}</td></tr>
        <tr style="border-bottom:1px solid var(--light)"><td style="padding:10px 8px;color:var(--slate)">Bonus question ${bonusCorrect?"✓":"✗"}</td><td style="padding:10px 8px;text-align:right;font-weight:600">${fmtINR(bonusINR)}</td></tr>
        <tr style="background:var(--navy)"><td style="padding:12px 8px;color:var(--white);font-weight:700;font-family:var(--font-h)">Total payout</td><td style="padding:12px 8px;text-align:right;font-weight:700;font-size:18px;color:var(--amber)">${fmtINR(totalINR)}</td></tr>
      </tbody>
    </table>
    <div class="info-box" style="margin-top:16px">Your payout of <strong>${fmtINR(totalINR)}</strong> will be processed electronically within one week. Thank you for your participation.</div>
    <div style="margin-top:20px;text-align:center;color:var(--slate);font-size:13px">Participant ID: <strong>${state.pid}</strong> &nbsp;|&nbsp; Contact: puneet.arora@mdi.ac.in</div>
  </div>`;
}

// ATTACH HANDLERS (timer for block 2, alloc total for rounds)
// ═══════════════════════════════════════════════════════════════════════════
function attachHandlers(sec){
  if(sec==="block2"){
    let secs=180;
    const bar=document.getElementById("timer-bar");
    const lbl=document.getElementById("timer-label");
    state.b2Timer=setInterval(()=>{
      secs--;
      const pct=Math.max(0,secs/180*100);
      if(bar){bar.style.width=pct+"%";bar.style.background=secs<30?"var(--red)":secs<60?"var(--amber)":"var(--green)";}
      const m=Math.floor(secs/60),s=secs%60;
      if(lbl)lbl.textContent=`Time remaining: ${m}:${s.toString().padStart(2,"0")}`;
      if(secs<=0){clearInterval(state.b2Timer);submitBlock2();}
    },1000);
  }
  if(["block6","block7","block8"].includes(sec)){
    const rMap={block6:"R1",block7:"R2",block8:"R3"};
    const round=rMap[sec];
    document.querySelectorAll(`input[id^="${round}_"]`).forEach(el=>el.addEventListener("input",()=>updateAllocTotal(round)));
  }
}
